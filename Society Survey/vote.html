<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>President Election</h1>
        <form>
            <div class="card-container">
                <div class="card">
                    <h3>Rahul Sharma</h3>
                    <p>Flat A-101</p>
                    <p>Position: President</p>
                    <p>Improve maintenance and transparency.</p>
                    <input type="radio" name="candidate">
                </div>
                <div class="card">
                    <h3>Priya Verma</h3>
                    <p>Flat B-205</p>
                    <p>Position: President</p>
                    <p>Focus on security and cleanliness.</p>
                    <input type="radio" name="candidate">
                </div>
                <div class="card">
                    <h3>Amit Kumar</h3>
                    <p>Flat C-303</p>
                    <p>Position: President</p>
                    <p>Digital society initiatives.</p>
                    <input type="radio" name="candidate">
                </div>
            </div>
            <br>
            <button type="submit">Submit Vote</button>
        </form>
    </div>
</body>
</html>
