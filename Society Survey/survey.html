<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Survey</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>  
    <div class="container">
        <h1>Society Survey</h1>
        <form>
            <h3>Cleanliness Satisfaction</h3>
            <input type="radio" name="clean"> Excellent
            <input type="radio" name="clean"> Good
            <input type="radio" name="clean"> Poor
            <br><br>
            <h3>Security Service Feedback</h3>
            <select>
                <option>Excellent</option>
                <option>Good</option>
                <option>Average</option>
                <option>Poor</option>
            </select>
            <h3>Parking Issues</h3>
            <input type="checkbox"> Lack of Space
            <br>
            <input type="checkbox"> Unauthorized Parking
            <br>
            <input type="checkbox"> Visitor Parking Issue
            <h3>Water Supply Feedback</h3>
            <textarea rows="4"></textarea>
            <h3>Maintenance Quality</h3>
            <select>
                <option>Excellent</option>
                <option>Good</option>
                <option>Average</option>
                <option>Poor</option>
            </select>
            <h3>Suggestions</h3>
            <textarea rows="5"></textarea>
            <button type="submit">Submit Survey</button>
        </form>
    </div>
</body>
</html>
