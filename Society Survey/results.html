<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Election Results</h1>
        <div class="card">
            <h2>Winner: Rahul Sharma</h2>
        </div>
        <br>
        <table>
            <tr>
                <th>Candidate</th>
                <th>Votes</th>
                <th>Percentage</th>
            </tr>
            <tr>
                <td>Rahul Sharma</td>
                <td>350</td>
                <td>50%</td>
            </tr>
            <tr>
                <td>Priya Verma</td>
                <td>245</td>
                <td>35%</td>
            </tr>
            <tr>
                <td>Amit Kumar</td>
                <td>105</td>
                <td>15%</td>
            </tr>
        </table>
        <br>
        <h2>Vote Share</h2>
        <p>Rahul Sharma</p>
        <div class="progress">
            <div class="progress-bar" style="width:50%"></div>
        </div>
        <br>
        <p>Priya Verma</p>
        <div class="progress">
            <div class="progress-bar" style="width:35%"></div>
        </div>
        <br>
        <p>Amit Kumar</p>
        <div class="progress">
            <div class="progress-bar" style="width:15%"></div>
        </div>
    </div>
</body>
</html>
