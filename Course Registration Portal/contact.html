<!DOCTYPE html>
<html>
<head>
<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

<h1 class="text-center mb-4">
Contact Us
</h1>

<div class="row">

<div class="col-md-6">

<form>

<div class="mb-3">
<input type="text"
class="form-control"
placeholder="Name">
</div>

<div class="mb-3">
<input type="email"
class="form-control"
placeholder="Email">
</div>

<div class="mb-3">
<textarea class="form-control"
rows="5"
placeholder="Message"></textarea>
</div>

<button class="btn btn-primary">
Send Message
</button>

</form>

</div>

<div class="col-md-6">

<div class="border p-5 text-center">
<h4>Google Map Placeholder</h4>
</div>

<h4 class="mt-4">Address</h4>

<p>
ABC Training Institute<br>
Hyderabad, Telangana
</p>

<p>Phone: +91 9876543210</p>
<p>Email: info@training.com</p>

</div>

</div>

</div>

</body>
</html>
